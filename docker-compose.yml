version: '3'
services:
  fluentnao:
    build: .
    image: fluentnao:dev
    platform: linux/amd64
    ports: ['127.0.0.1:5050:5050']
    environment:
      - NAO_IP=${NAO_IP}
    volumes:
      - .:/fluentnao
      - ./data/photos:/data/photos
      - ./data/video:/data/video
      - ./data/audio:/data/audio
      - ./data/object_detection:/data/object_detection
      - ~/.ssh:/root/.ssh:ro
